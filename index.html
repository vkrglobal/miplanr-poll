<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>miPlanr Poll Creator</title>
<style>
:root{--navy:#0A1A4D;--blue:#0072FF;--cyan:#00C6FF;--teal:#00BFA5;--pink:#EC2AA7;--off:#F4F7FC;--border:#E2E8F4;--text:#0A1A4D;--muted:#6B7A99;--white:#fff;--shadow:0 10px 35px rgba(10,26,77,.12)}
*{box-sizing:border-box}body{margin:0;font-family:Segoe UI,system-ui,Arial,sans-serif;background:var(--off);color:var(--text)}.topbar{background:var(--navy);color:white;padding:16px 24px;border-bottom:3px solid var(--blue);display:flex;justify-content:space-between;align-items:center}.brand{font-weight:800;font-size:24px}.tag{font-size:12px;letter-spacing:.12em;text-transform:uppercase;color:#b9c5dd}.wrap{max-width:900px;margin:34px auto;padding:0 18px}.card{background:white;border:1px solid var(--border);border-radius:18px;padding:26px;box-shadow:var(--shadow);margin:18px 0}h1{font-size:34px;margin:0 0 8px}.muted{color:var(--muted)}label{display:block;font-size:12px;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);font-weight:700;margin:16px 0 8px}input,textarea{width:100%;border:1.5px solid var(--border);border-radius:12px;padding:14px;font:inherit;color:var(--text)}textarea{min-height:95px}.grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}.option-row{display:flex;gap:8px;margin:8px 0}.option-row input{flex:1}.small-btn{border:1px solid var(--border);background:white;border-radius:10px;padding:8px 12px;cursor:pointer}.btn{border:0;border-radius:12px;padding:14px 18px;font-weight:800;cursor:pointer;background:linear-gradient(90deg,var(--blue),var(--cyan));color:white}.btn.secondary{background:var(--navy)}.btn.whatsapp{background:#25D366;color:#071b10}.actions{display:flex;gap:12px;flex-wrap:wrap;align-items:center}.result{background:#07164a;color:white;border-radius:14px;padding:16px;word-break:break-word}.error{background:#ffe9f7;color:#8a0f5b;border:1px solid #ffc2e8;border-radius:12px;padding:12px;margin-top:12px}.success{background:#e6faf7;color:#005f53;border:1px solid #baf0e9;border-radius:12px;padding:12px;margin-top:12px}@media(max-width:700px){.grid{grid-template-columns:1fr}.actions{flex-direction:column;align-items:stretch}.btn{width:100%}}
</style>
</head>
<body>
<header class="topbar"><div class="brand">miPlanr</div><div class="tag">Poll & Schedule</div></header>
<main class="wrap">
  <h1>Create a new poll</h1>
  <p class="muted">Create a shareable poll link. Poll data is stored in Supabase, so links stay short and votes persist.</p>
  <section class="card">
    <label>Poll question</label>
    <input id="question" value="Where should we go on holiday?" />
    <div class="grid">
      <div><label>Event title</label><input id="eventTitle" value="Sims July 2026 Holiday" /></div>
      <div><label>Your name</label><input id="creatorName" value="Josh Sim" /></div>
    </div>
    <div class="grid">
      <div><label>Closing date / note</label><input id="deadline" value="2 Jul" /></div>
      <div><label>Votes needed</label><input id="threshold" type="number" min="1" value="3" /></div>
    </div>
  </section>
  <section class="card">
    <label>Options</label>
    <div id="options"></div>
    <button class="small-btn" onclick="addOption('')">+ Add option</button>
  </section>
  <section class="card">
    <label>Participants (names or emails, one per line)</label>
    <textarea id="participants">vkrglobal@gmail.com
josh@vkrglobal.net</textarea>
    <p class="muted">Email sending works after you add RESEND_API_KEY in Netlify. WhatsApp sharing works immediately.</p>
  </section>
  <div class="actions">
    <button class="btn" onclick="createPoll()">Create poll</button>
    <a class="small-btn" href="guide.html">Open guide</a>
  </div>
  <div id="msg"></div>
  <section id="created" class="card" style="display:none">
    <label>Your poll link</label>
    <div class="result" id="pollLink"></div>
    <div class="actions" style="margin-top:14px">
      <button class="btn secondary" onclick="copyLink()">Copy link</button>
      <button class="btn whatsapp" onclick="shareWhatsApp()">Share on WhatsApp</button>
      <button class="small-btn" onclick="sendInvites()">Send email invites</button>
      <a id="openPoll" class="small-btn" target="_blank">Open poll</a>
    </div>
  </section>
</main>
<script>
let lastUrl = '';
function addOption(value=''){
  const row=document.createElement('div'); row.className='option-row';
  row.innerHTML=`<input value="${value.replaceAll('"','&quot;')}" placeholder="Option"><button class="small-btn" onclick="this.parentElement.remove()">×</button>`;
  document.getElementById('options').appendChild(row);
}
['Turkey','New Zealand','Other'].forEach(addOption);
function show(type,text){document.getElementById('msg').innerHTML=`<div class="${type}">${text}</div>`}
async function createPoll(){
  document.getElementById('msg').innerHTML='';
  const options=[...document.querySelectorAll('#options input')].map(i=>i.value.trim()).filter(Boolean);
  const participants=document.getElementById('participants').value.split(/\n|,/).map(x=>x.trim()).filter(Boolean);
  const payload={question:question.value.trim(),eventTitle:eventTitle.value.trim(),creatorName:creatorName.value.trim(),deadline:deadline.value.trim(),threshold:Number(threshold.value||1),options,participants};
  try{
    const r=await fetch('/.netlify/functions/create-poll',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify(payload)});
    const data=await r.json(); if(!r.ok) throw new Error(data.error||'Could not create poll');
    lastUrl=location.origin+data.url;
    pollLink.textContent=lastUrl; openPoll.href=lastUrl; created.style.display='block';
    show('success','Poll created. You can now copy or share the link.');
  }catch(e){show('error',e.message)}
}
function copyLink(){navigator.clipboard.writeText(lastUrl);show('success','Link copied.');}
function shareWhatsApp(){window.open('https://wa.me/?text='+encodeURIComponent('Please vote in this miPlanr poll: '+lastUrl),'_blank');}
async function sendInvites(){
  const recipients=participants.value.split(/\n|,/).map(x=>x.trim()).filter(Boolean);
  const r=await fetch('/.netlify/functions/send-invites',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify({recipients,url:lastUrl,subject:'Please vote in this miPlanr poll'})});
  const data=await r.json(); show(data.id?'success':'error',data.message||'Email request completed.');
}
</script>
</body>
</html>
