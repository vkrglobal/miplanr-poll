<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>miPlanr Poll</title><link rel="stylesheet" href="/assets/app.css"></head><body><header class="topbar"><div class="brand">mi<span>Planr</span></div><nav class="nav"><a href="/index.html">Create poll</a></nav></header><main class="shell"><section class="card"><div class="hero" style="margin:-26px -26px 24px"><span class="pill"><span id="pollIcon">✨</span> Live event poll</span><h1 id="pollTitle">Loading...</h1><p id="pollQuestion">Choose your option.</p><p id="pollMeta"></p></div><p class="small" id="voteMsg">Loading poll...</p><div id="optionsList"></div><div style="display:flex;justify-content:space-between;margin:18px 0 8px"><span id="progressText">0 votes</span><strong id="progressPct">0%</strong></div><div class="progress"><div id="progressFill" style="width:0%"></div></div><div class="grid" style="margin-top:24px"><div><div class="label">Your name</div><input class="input" id="voterName" placeholder="First name"></div><div><div class="label">Email optional</div><input class="input" id="voterEmail" placeholder="you@email.com"></div></div><div class="btns"><button class="btn" onclick="submitVote()">Cast / Update vote</button><button class="btn secondary" onclick="refreshPoll()">Refresh results</button></div><div class="btns" id="calendarBtns" style="display:none"><a class="btn green" id="waPoll" target="_blank">Share WhatsApp</a><a class="btn secondary" id="gcal" target="_blank">Google Calendar</a><a class="btn secondary" id="outlook" target="_blank">Outlook / Teams</a></div></section></main><div class="toast" id="toast"></div><footer class="footer">miPlanr • Dream • Plan • Soar</footer><script src="/assets/app.js"></script><script>initPoll()</script></body></html>
