<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>miPlanr Poll</title><link rel="stylesheet" href="/assets/app.css"></head><body>
<header class="topbar"><div class="brand">mi<span>Planr</span></div><div class="tag">Live Poll</div></header>
<main class="poll-card"><div class="poll-shell">
  <section class="poll-head"><div class="badge">● Live poll</div><h1 id="q">Loading...</h1><p class="poll-sub" id="eventLine"></p><p class="poll-sub" id="scheduleLine"></p><div class="meta"><span><strong id="creator">miPlanr</strong> · closes <span id="deadline">—</span></span><span class="pill" id="threshold">0 votes needed</span></div></section>
  <section class="poll-body">
    <div id="celebrate" class="celebrate" style="display:none">🎉 Quorum reached. miPlanr has a winner.</div>
    <div class="section-label">Choose your option</div><div id="options"></div>
    <div class="progress-row"><span id="voteLabel">0 votes</span><strong id="votePct" style="color:var(--blue)">0%</strong></div><div class="progress"><div id="fill" class="fill" style="width:0%"></div></div>
    <div class="grid" style="margin-top:24px"><div class="field"><label>Your name</label><input id="voterName" placeholder="First name"></div><div class="field"><label>Email optional</label><input id="voterEmail" type="email" placeholder="you@email.com"></div></div>
    <button id="voteBtn" class="btn" disabled onclick="submitVote()">Cast your vote</button>
    <div id="afterVote" style="display:none;margin-top:24px"><div class="notice">Vote recorded. Thank you ✅</div><div class="actions"><button class="btn secondary" onclick="loadPoll()">Refresh results</button><a id="wa" class="btn whatsapp" target="_blank" rel="noopener">Share via WhatsApp</a><a id="google" class="btn secondary" target="_blank" rel="noopener">Google Calendar</a><a id="outlook" class="btn secondary" target="_blank" rel="noopener">Outlook / Teams</a></div></div>
  </section>
</div></main><div id="toast" class="toast"></div>
<script>
let state=null, selected=null;const params=new URLSearchParams(location.search);const slug=params.get('slug')||(location.pathname.split('/').filter(Boolean)[1]);
function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500)}
function emojiFor(text){const s=String(text||'').toLowerCase();const pairs=[['greece','🇬🇷'],['greek','🇬🇷'],['albania','🇦🇱'],['turkey','🇹🇷'],['new zealand','🇳🇿'],['nz','🇳🇿'],['uk','🇬🇧'],['england','🏴'],['france','🇫🇷'],['spain','🇪🇸'],['italy','🇮🇹'],['usa','🇺🇸'],['america','🇺🇸'],['banana','🍌'],['food','🍽️'],['shopping','🛍️'],['park','🌳'],['beach','🏖️'],['ski','🎿'],['snow','❄️'],['football','⚽'],['rugby','🏉'],['tennis','🎾'],['coffee','☕'],['pizza','🍕'],['cinema','🎬'],['meeting','📅'],['yes','✅'],['no','❌'],['maybe','🤔'],['other','✨']];return (pairs.find(([k])=>s.includes(k))||['','🗳️'])[1]}
function fmtDateTime(iso){if(!iso)return '';try{return new Date(iso).toLocaleString('en-GB',{weekday:'short',day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'});}catch{return ''}}
async function get(path){const r=await fetch('/.netlify/functions/'+path);const d=await r.json().catch(()=>({}));if(!r.ok)throw new Error(d.error||d.message||'Request failed');return d}
async function post(path,body){const r=await fetch('/.netlify/functions/'+path,{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify(body)});const d=await r.json().catch(()=>({}));if(!r.ok)throw new Error(d.error||d.message||'Request failed');return d}
async function loadPoll(){try{state=await get('get-poll?slug='+encodeURIComponent(slug));render()}catch(e){q.textContent='Poll not found';alert(e.message)}}
function render(){const {poll,options,counts,totalVotes}=state;q.textContent=poll.question;eventLine.textContent=poll.event_title?('Event: '+poll.event_title):'';creator.textContent=poll.creator_name||'miPlanr';deadline.textContent=poll.deadline||'—';threshold.textContent=(poll.threshold||1)+' votes needed';const schedule=fmtDateTime(poll.start_at)+(poll.end_at?' → '+fmtDateTime(poll.end_at):'');scheduleLine.textContent=schedule?('When: '+schedule):'';let winnerId=null,winnerCount=-1;options.forEach(o=>{const c=counts[o.id]||0;if(c>winnerCount){winnerCount=c;winnerId=o.id}});const quorum=totalVotes>=(poll.threshold||1);celebrate.style.display=quorum?'block':'none';document.getElementById('options').innerHTML=options.map(o=>{const c=counts[o.id]||0;const pct=totalVotes?Math.round((c/totalVotes)*100):0;const isWinner=winnerId===o.id&&c>0;return `<button class="option ${selected===o.id?'selected':''} ${isWinner?'winner':''}" onclick="pick('${o.id}')"><div class="bar" style="width:${pct}%"></div><span class="choice-emoji">${emojiFor(o.label)}</span><span class="radio"></span><span class="opt-text">${o.label}</span><span class="pct">${pct}% ${isWinner?'✓':''}</span></button>`}).join('');voteLabel.textContent=totalVotes+' of '+(poll.threshold||1)+' votes';const donePct=Math.min(100,Math.round((totalVotes/(poll.threshold||1))*100));votePct.textContent=donePct+'%';fill.style.width=donePct+'%';const url=location.href;wa.href='https://wa.me/?text='+encodeURIComponent('Please vote in this miPlanr poll: '+url);const winOpt=options.find(o=>o.id===winnerId)||options[0];const title=(poll.event_title||poll.question)+' - '+(winOpt?.label||'Winning option');const start=poll.start_at?new Date(poll.start_at):new Date(Date.now()+30*60000);const end=poll.end_at?new Date(poll.end_at):new Date(start.getTime()+30*60000);function cal(d){return d.toISOString().replace(/[-:]/g,'').replace(/\.\d{3}/,'')}google.href='https://calendar.google.com/calendar/render?action=TEMPLATE&text='+encodeURIComponent(title)+'&dates='+cal(start)+'/'+cal(end)+'&details='+encodeURIComponent(url);outlook.href='https://outlook.live.com/calendar/0/deeplink/compose?path=/calendar/action/compose&rru=addevent&subject='+encodeURIComponent(title)+'&startdt='+encodeURIComponent(start.toISOString())+'&enddt='+encodeURIComponent(end.toISOString())+'&body='+encodeURIComponent(url)}
function pick(id){selected=id;voteBtn.disabled=false;render()}
async function submitVote(){if(!selected)return;voteBtn.disabled=true;try{const result=await post('vote',{pollId:state.poll.id,optionId:selected,voterName:voterName.value,voterEmail:voterEmail.value});afterVote.style.display='block';toast(result.quorumReached?'🎉 Vote saved — quorum reached!':'Vote saved');await loadPoll()}catch(e){alert(e.message);voteBtn.disabled=false}}
loadPoll();
</script></body></html>
