<!doctype html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>miPlanr Poll</title>
<style>
:root{--navy:#0A1A4D;--blue:#0072FF;--cyan:#00C6FF;--teal:#00BFA5;--pink:#EC2AA7;--off:#F4F7FC;--border:#E2E8F4;--text:#0A1A4D;--muted:#6B7A99;--white:#fff;--shadow:0 10px 35px rgba(10,26,77,.12)}
*{box-sizing:border-box}body{margin:0;font-family:Segoe UI,system-ui,Arial,sans-serif;background:var(--off);color:var(--text)}.topbar{background:var(--navy);color:white;padding:16px 24px;border-bottom:3px solid var(--blue);display:flex;justify-content:space-between}.brand{font-weight:800;font-size:24px}.tag{font-size:12px;letter-spacing:.12em;text-transform:uppercase;color:#b9c5dd}.wrap{max-width:760px;margin:34px auto;padding:0 18px}.card{background:white;border:1px solid var(--border);border-radius:18px;box-shadow:var(--shadow);overflow:hidden}.head{background:linear-gradient(135deg,#111a58,#093d75);color:white;padding:28px}.badge{color:var(--teal);font-weight:800;font-size:12px;text-transform:uppercase;letter-spacing:.1em}h1{margin:10px 0;font-size:30px}.body{padding:26px}.muted{color:var(--muted)}.option{border:1.5px solid var(--border);border-radius:12px;padding:14px 16px;margin:10px 0;display:flex;justify-content:space-between;align-items:center;cursor:pointer;background:white}.option:hover{border-color:var(--blue)}.option.selected{background:linear-gradient(90deg,var(--blue),var(--cyan));color:white}.count{font-weight:800;color:var(--teal)}label{display:block;font-size:12px;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);font-weight:700;margin:16px 0 8px}input{width:100%;border:1.5px solid var(--border);border-radius:12px;padding:14px;font:inherit}.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}.btn{border:0;border-radius:12px;padding:14px 18px;font-weight:800;cursor:pointer;background:linear-gradient(90deg,var(--blue),var(--cyan));color:white;width:100%;margin-top:16px}.btn.whatsapp{background:#25D366;color:#071b10}.message{border-radius:12px;padding:12px;margin:14px 0}.error{background:#ffe9f7;color:#8a0f5b}.success{background:#e6faf7;color:#005f53}.progress{height:8px;background:var(--border);border-radius:99px;overflow:hidden;margin:14px 0}.bar{height:100%;background:linear-gradient(90deg,var(--blue),var(--teal))}.actions{display:flex;gap:10px;flex-wrap:wrap}.actions .btn{width:auto;flex:1}@media(max-width:640px){.grid{grid-template-columns:1fr}.actions{display:block}.actions .btn{width:100%}}
</style></head><body><header class="topbar"><div class="brand">miPlanr</div><div class="tag">Poll & Schedule</div></header>
<main class="wrap"><section class="card"><div class="head"><div class="badge">Live poll</div><h1 id="question">Loading...</h1><div id="meta" class="muted" style="color:#dbe8ff"></div></div><div class="body"><div id="msg"></div><div id="options"></div><div class="progress"><div id="bar" class="bar" style="width:0%"></div></div><div id="summary" class="muted"></div><div class="grid"><div><label>Your name</label><input id="voterName" placeholder="First name"></div><div><label>Email optional</label><input id="voterEmail" placeholder="you@email.com"></div></div><button class="btn" onclick="submitVote()">Cast your vote</button><hr style="border:0;border-top:1px solid var(--border);margin:24px 0"><div class="actions"><button class="btn whatsapp" onclick="shareWhatsApp()">Share on WhatsApp</button><button class="btn" onclick="openCalendar('google')">Add leading option to Google Calendar</button></div></div></section></main>
<script>
const qs=new URLSearchParams(location.search); const slug=qs.get('slug'); let data=null; let selected=null;
function show(type,text){msg.innerHTML=`<div class="message ${type}">${text}</div>`}
async function loadPoll(){try{if(!slug) throw new Error('Missing poll ID.'); const r=await fetch('/.netlify/functions/get-poll?slug='+encodeURIComponent(slug)); data=await r.json(); if(!r.ok) throw new Error(data.error||'Poll not found'); render();}catch(e){show('error',e.message)}}
function render(){const p=data.poll; question.textContent=p.question; meta.textContent=`${p.creator_name||'miPlanr'} · closes ${p.deadline||'not set'} · ${p.threshold||1} vote(s) needed`; const total=Object.values(data.counts||{}).reduce((a,b)=>a+b,0); const max=Math.max(total,p.threshold||1); bar.style.width=Math.min(100,Math.round(total/max*100))+'%'; summary.textContent=`${total} vote(s) so far`; options.innerHTML=data.options.map(o=>`<div class="option ${selected===o.id?'selected':''}" onclick="selected='${o.id}';render()"><span>${o.label}</span><span class="count">${data.counts[o.id]||0}</span></div>`).join('')}
async function submitVote(){try{if(!selected) throw new Error('Choose an option first.'); const r=await fetch('/.netlify/functions/vote',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify({pollId:data.poll.id,optionId:selected,voterName:voterName.value,voterEmail:voterEmail.value})}); const res=await r.json(); if(!r.ok) throw new Error(res.error||'Vote failed'); show('success','Vote recorded.'); selected=null; await loadPoll();}catch(e){show('error',e.message)}}
function shareWhatsApp(){window.open('https://wa.me/?text='+encodeURIComponent('Please vote in this miPlanr poll: '+location.href),'_blank')}
function openCalendar(){if(!data)return; const counts=data.counts||{}; const win=[...data.options].sort((a,b)=>(counts[b.id]||0)-(counts[a.id]||0))[0]; const text=encodeURIComponent((data.poll.event_title||data.poll.question)+' - '+(win?win.label:'')); window.open('https://calendar.google.com/calendar/render?action=TEMPLATE&text='+text,'_blank')}
loadPoll();
</script></body></html>
