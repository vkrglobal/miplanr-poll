<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Vote | miPlanr</title><style>
:root{--navy:#0A1A4D;--blue:#0072FF;--cyan:#00C6FF;--pink:#EC2AA7;--teal:#00BFA5;--off:#F4F7FC;--muted:#6B7A99;--border:#E2E8F4}*{box-sizing:border-box}body{margin:0;font-family:Inter,system-ui,Segoe UI,Arial,sans-serif;background:linear-gradient(180deg,#fff,var(--off));color:var(--navy)}.top{background:var(--navy);color:white;padding:18px 22px;display:flex;justify-content:space-between}.brand{font-size:24px;font-weight:900}.brand span{color:var(--cyan)}.wrap{max-width:760px;margin:28px auto;padding:0 18px}.card{background:white;border:1px solid var(--border);border-radius:24px;box-shadow:0 18px 60px rgba(10,26,77,.1);padding:24px}.hero{background:linear-gradient(150deg,var(--navy),#102a68);color:white}.icon{font-size:54px}.muted{color:var(--muted);font-size:14px}.hero .muted{color:#cfe4ff}.option{width:100%;text-align:left;margin:10px 0;padding:16px;border:1.5px solid var(--border);border-radius:16px;background:#fff;cursor:pointer;font-weight:800;color:var(--navy);display:flex;justify-content:space-between;align-items:center}.option.selected{border-color:var(--blue);background:#eef7ff}.bar{height:8px;background:#eef3fb;border-radius:99px;overflow:hidden;margin-top:6px}.fill{height:100%;background:linear-gradient(90deg,var(--blue),var(--teal))}.btn{border:0;border-radius:14px;padding:14px 18px;font-weight:900;cursor:pointer;background:linear-gradient(90deg,var(--blue),var(--cyan));color:white}.btn.secondary{background:white;color:var(--blue);border:1.5px solid var(--blue)}input{width:100%;padding:13px;border:1.5px solid var(--border);border-radius:14px;margin:6px 0 12px}.cal{display:flex;gap:10px;flex-wrap:wrap;margin-top:16px}.success{background:#ebfff9;border:1px solid #b7f1e4;border-radius:16px;padding:14px;margin-top:14px;color:#006b5b}.closed{background:#fff4f8;border:1px solid #ffd4e9;border-radius:16px;padding:14px;margin-top:14px}.hidden{display:none}</style></head><body><div class="top"><div class="brand">mi<span>Planr</span></div><div>Dream • Plan • Soar</div></div><main class="wrap"><section class="card hero"><div class="icon" id="icon">🗳️</div><h1 id="title">Loading poll...</h1><h2 id="question"></h2><p class="muted" id="details"></p></section><section class="card" style="margin-top:18px"><div id="status" class="muted"></div><div id="options"></div><div id="identity"><input id="voterName" placeholder="Your name"><input id="voterEmail" type="email" placeholder="Your email"></div><button class="btn" id="voteBtn" onclick="submitVote()">Cast vote</button><div id="message"></div><div class="cal"><button class="btn secondary" onclick="googleCal()">Google Calendar</button><button class="btn secondary" onclick="outlookCal()">Outlook</button><button class="btn secondary" onclick="copyLink()">Copy Link</button></div></section></main><script>
const qs=new URLSearchParams(location.search);const slug=qs.get('slug');const invite=qs.get('invite');let poll,options=[],counts={},selected=null,participant=null,participantVote=null,totalVotes=0;
function enc(s){return encodeURIComponent(s||'')}
async function load(){const res=await fetch(`/api/get-poll?slug=${enc(slug)}&invite=${enc(invite||'')}`);const data=await res.json();if(!res.ok){title.textContent='Could not load poll';question.textContent=data.error||'';return}poll=data.poll;options=data.options;counts=data.counts||{};participant=data.participant;participantVote=data.participantVote;totalVotes=data.totalVotes||0;render()}
function render(){icon.textContent=poll.icon||'🗳️';title.textContent=poll.title;question.textContent=poll.question;details.textContent=[poll.description,poll.location?`📍 ${poll.location}`:'',poll.start_at?`🗓 ${new Date(poll.start_at).toLocaleString()}`:''].filter(Boolean).join(' • ');if(participant){voterEmail.value=participant.email||'';voterEmail.readOnly=true;voterName.value=participant.name||''}if(participantVote){selected=participantVote.option_id;voteBtn.textContent='Update my vote'}const closed=poll.deadline_at&&new Date(poll.deadline_at)<new Date();if(closed){voteBtn.disabled=true;message.innerHTML='<div class="closed">Voting has closed.</div>'}status.textContent=`${totalVotes} of ${poll.threshold||3} votes received`;optionsEl=options.map(o=>{const c=counts[o.id]||0;const pct=totalVotes?Math.round(c/totalVotes*100):0;return `<button class="option ${selected===o.id?'selected':''}" onclick="pick('${o.id}')"><span>${o.icon||'✨'} ${o.option_text}</span><span>${pct}%</span></button><div class="bar"><div class="fill" style="width:${pct}%"></div></div>`}).join('');options.innerHTML=optionsEl}
function pick(id){selected=id;render()}async function submitVote(){if(!selected){message.textContent='Please choose an option.';return}const body={pollSlug:slug,inviteToken:invite,optionId:selected,voterName:voterName.value,voterEmail:voterEmail.value};const res=await fetch('/api/submit-vote',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});const data=await res.json();if(!res.ok){message.innerHTML=`<div class="closed">${data.error}</div>`;return}message.innerHTML='<div class="success">✅ Vote saved. You can edit it before the deadline by returning to this invitation link.</div>';await load()}
function calUrl(kind){const start=poll.start_at?new Date(poll.start_at):new Date();const end=poll.end_at?new Date(poll.end_at):new Date(start.getTime()+3600000);const fmt=d=>d.toISOString().replace(/[-:]/g,'').split('.')[0]+'Z';const text=`${poll.title} - ${poll.question}`;const details=`miPlanr poll: ${location.href}`;if(kind==='google')return `https://calendar.google.com/calendar/render?action=TEMPLATE&text=${enc(text)}&dates=${fmt(start)}/${fmt(end)}&details=${enc(details)}&location=${enc(poll.location||'')}`;return `https://outlook.live.com/calendar/0/deeplink/compose?subject=${enc(text)}&startdt=${enc(start.toISOString())}&enddt=${enc(end.toISOString())}&body=${enc(details)}&location=${enc(poll.location||'')}`}
function googleCal(){window.open(calUrl('google'),'_blank')}function outlookCal(){window.open(calUrl('outlook'),'_blank')}function copyLink(){navigator.clipboard.writeText(location.href);message.textContent='Link copied.'}load();
</script></body></html>
