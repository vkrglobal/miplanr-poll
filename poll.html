<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>miPlanr Poll</title><link rel="stylesheet" href="assets/app.css"></head><body><header class="top"><div><div class="brand">miPlanr</div><div class="tag">Live event poll</div></div><a class="btn secondary" href="index.html">Create poll</a></header><main class="wrap"><section class="pollcard"><div class="pollhead"><div id="icon" style="font-size:44px">✨</div><h1 id="title">Loading...</h1><p id="meta"></p><span class="pill" id="quorum"></span></div><div class="card" style="box-shadow:none;border:0;border-radius:0"><p class="hint">Choose your option. Your invitation allows one vote, but you can edit it before the deadline.</p><div id="choices"></div><p><span id="progress"></span> <strong id="pct"></strong></p><div class="row"><input id="name" placeholder="Your name"><input id="email" placeholder="Email optional"></div><button class="btn" id="voteBtn" style="margin-top:16px">Cast / Update vote</button><div id="notice"></div><div class="sharegrid"><button class="btn secondary" onclick="load()">Refresh results</button><a class="btn whatsapp" id="wa" target="_blank">Share WhatsApp</a><a class="btn secondary" id="gcal" target="_blank">Google Calendar</a><a class="btn secondary" id="ocal" target="_blank">Outlook / Teams</a></div></div></section></main><script src="assets/app.js"></script><script>
const params=new URLSearchParams(location.search); const slug=params.get('slug')||location.pathname.split('/').pop(); const invite=params.get('invite')||''; let poll, selected=null, participant=null;
async function load(){try{const res=await fetch('/api/get-poll?slug='+encodeURIComponent(slug)+'&invite='+encodeURIComponent(invite)); const data=await res.json(); if(data.error) throw new Error(data.error); poll=data.poll; participant=data.participant; $('#icon').textContent=poll.icon||iconFor(poll.title); $('#title').textContent=poll.title||poll.question; $('#meta').textContent=(poll.creator_name||'miPlanr')+' · '+(poll.location?('📍 '+poll.location+' · '):'')+(poll.deadline_at?('closes '+new Date(poll.deadline_at).toLocaleString()):''); $('#quorum').textContent=(poll.threshold||3)+' votes needed'; if(participant){$('#email').value=participant.email||''; if(participant.vote) selected=participant.vote.option_id} render(); $('#wa').href='https://wa.me/?text='+encodeURIComponent('Please vote in this miPlanr poll: '+location.href); $('#gcal').href=calendarUrl('google',poll); $('#ocal').href=calendarUrl('outlook',poll);}catch(e){$('#title').textContent='Could not load poll'; $('#choices').textContent=e.message}}
function render(){const total=poll.options.reduce((a,o)=>a+(o.votes||0),0); $('#choices').innerHTML=''; poll.options.forEach(o=>{const p=total?Math.round((o.votes||0)*100/total):0; const div=document.createElement('div');div.className='choice '+(selected===o.id?'selected':'');div.innerHTML=`<div class="bar" style="width:${p}%"></div><span>${o.icon||iconFor(o.option_text)} ${o.option_text}</span><span class="pct">${p}%</span>`;div.onclick=()=>{selected=o.id;render()};$('#choices').appendChild(div)}); $('#progress').textContent=`${total} of ${poll.threshold||3} votes`; $('#pct').textContent=(poll.threshold?Math.min(100,Math.round(total*100/poll.threshold)):0)+'%'; if(total>=poll.threshold){$('#notice').innerHTML='<div class="notice">🎉 Quorum reached! Poll successful.</div>'}}
$('#voteBtn').onclick=async()=>{if(!selected) return alert('Choose an option first'); try{const res=await jfetch('/api/vote',{slug,invite,option_id:selected,voter_name:$('#name').value.trim(),voter_email:$('#email').value.trim()}); $('#notice').innerHTML='<div class="notice">Vote recorded. You can edit it before the deadline. ✅</div>'; await load();}catch(e){alert(e.message)}}; load();
</script></body></html>
