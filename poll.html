<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>miPlanr Poll</title><link rel="stylesheet" href="/assets/app.css"></head><body>
<header class="topbar"><div class="brand">miPlanr</div><div class="tag">Live Poll</div></header>
<main class="poll-card">
  <section class="poll-head"><div class="badge">● Live poll</div><h1 id="q">Loading...</h1><div class="meta"><span><strong id="creator">miPlanr</strong> · closes <span id="deadline">—</span></span><span class="pill" id="threshold">0 votes needed</span></div></section>
  <section class="poll-body">
    <div class="section-label">Choose your option</div><div id="options"></div>
    <div style="display:flex;justify-content:space-between;color:var(--muted);font-size:14px;margin-top:18px"><span id="voteLabel">0 votes</span><strong id="votePct" style="color:var(--blue)">0%</strong></div><div class="progress"><div id="fill" class="fill" style="width:0%"></div></div>
    <div class="grid" style="margin-top:22px"><div class="field"><label>Your name</label><input id="voterName" placeholder="First name"></div><div class="field"><label>Email optional</label><input id="voterEmail" type="email" placeholder="you@email.com"></div></div>
    <button id="voteBtn" class="btn" disabled onclick="submitVote()">Cast your vote</button>
    <div id="afterVote" style="display:none;margin-top:22px"><div class="notice">Vote recorded. Thank you ✅</div><div class="actions"><button class="btn secondary" onclick="loadPoll()">Refresh results</button><a id="wa" class="btn whatsapp" target="_blank">Share via WhatsApp</a><a id="google" class="btn secondary" target="_blank">Google Calendar</a><a id="outlook" class="btn secondary" target="_blank">Outlook / Teams</a></div></div>
  </section>
</main><div id="toast" class="toast"></div>
<script>
let state=null, selected=null;const params=new URLSearchParams(location.search);const slug=params.get('slug')||(location.pathname.split('/').filter(Boolean)[1]);
function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500)}
async function get(path){const r=await fetch('/.netlify/functions/'+path);const d=await r.json().catch(()=>({}));if(!r.ok)throw new Error(d.error||'Request failed');return d}
async function post(path,body){const r=await fetch('/.netlify/functions/'+path,{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify(body)});const d=await r.json().catch(()=>({}));if(!r.ok)throw new Error(d.error||'Request failed');return d}
async function loadPoll(){try{state=await get('get-poll?slug='+encodeURIComponent(slug));render()}catch(e){document.getElementById('q').textContent='Poll not found';alert(e.message)}}
function render(){const {poll,options,counts,totalVotes}=state;q.textContent=poll.question;creator.textContent=poll.creator||'miPlanr';deadline.textContent=poll.deadline||'—';threshold.textContent=(poll.threshold||1)+' votes needed';const winnerId=options.reduce((best,o)=>((counts[o.id]||0)>(counts[best]?.count||-1)?{id:o.id,count:counts[o.id]||0}:best),{id:null,count:-1}).id;document.getElementById('options').innerHTML=options.map(o=>{const c=counts[o.id]||0;const pct=totalVotes?Math.round((c/totalVotes)*100):0;return `<button class="option ${selected===o.id?'selected':''}" onclick="pick('${o.id}')"><div class="bar" style="width:${pct}%"></div><span>${o.label}</span><span class="pct">${pct}% ${winnerId===o.id&&c>0?'✓':''}</span></button>`}).join('');voteLabel.textContent=totalVotes+' of '+poll.threshold+' votes';const donePct=Math.min(100,Math.round((totalVotes/(poll.threshold||1))*100));votePct.textContent=donePct+'%';fill.style.width=donePct+'%';const url=location.href;wa.href='https://wa.me/?text='+encodeURIComponent('Please vote in this miPlanr poll: '+url);const winOpt=options.find(o=>o.id===winnerId)||options[0];const title=(poll.event_title||poll.question)+' - '+(winOpt?.label||'Winning option');google.href='https://calendar.google.com/calendar/render?action=TEMPLATE&text='+encodeURIComponent(title)+'&details='+encodeURIComponent(url);outlook.href='https://outlook.live.com/calendar/0/deeplink/compose?path=/calendar/action/compose&rru=addevent&subject='+encodeURIComponent(title)+'&body='+encodeURIComponent(url)}
function pick(id){selected=id;voteBtn.disabled=false;render()}
async function submitVote(){if(!selected)return;voteBtn.disabled=true;try{await post('vote',{poll_id:state.poll.id,option_id:selected,voter_name:voterName.value,voter_email:voterEmail.value});afterVote.style.display='block';toast('Vote saved');await loadPoll()}catch(e){alert(e.message);voteBtn.disabled=false}}
loadPoll();
</script></body></html>
